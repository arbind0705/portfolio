<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbind malava - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(8, 8, 38);
            color: white;
            font-family: "Poppins", sans-serif;
            font-weight: 400;
            font-style: normal;
        }
        nav{
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 55px;
            background-color: rgb(14, 14, 58)
        }
        nav ul{
            display: flex;
            justify-content: center;
        }
        nav ul li{
            list-style: none;
            margin: 0 23px;

        }
        nav ul li a{
            text-decoration: none;
            color: white;

        }
        nav ul li a:hover{
            color: rgb(90, 90, 157);
            font-size: 1.04rem;

        }
        .left{
            font-size: 1.5rem;
        }
        .firstSection{
            display: flex;
            justify-content: space-around;
            margin: 23vw 0;
            align-items: center;
        }
        .firstSection > div{
            width: 30%;
        }
        .leftSection{
            
            margin: 70px;
            font-size: 3rem;
        }
        .rightSection img{
            width:70%;
        }
        .purple{
            color: blueviolet;
        }
        #element{
            color:blueviolet;
        }
        .secondSection{
            max-width:80vw;
            margin:auto;
        }
        main hr{
            border:0;
            background:#9c97f1;
            height:1.2px;
            margin: 40px 84px;
        }
        .secondSection h1{
            font-size: 1.7rem; 
        }
        .text-grey{
            color:gray;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left">Arbind's portfolio</div>
            <div class="right">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/">About</a></li>
                    <li><a href="/">Services</a></li>
                    <li><a href="/">projects</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="firstSection">
            <div class="leftSection">
                Hy! welcome to my page
                <div class="purple">My name is Arbind</div>               
                <div> well move</div>
                <span id="element"></span>
            </div>
            <div class="rightSection">
                <img src="robo.png" alt="">
            </div>
        </section>
        <hr>
        <section class="secondSection">
            <span class="text-grey">Things i have done so Far</span>
            <h1>Past Experience</h1>
        </section>
    </main>
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
     <script>
    var typed = new Typed('#element', {
      strings: ['web development','projects','llm','dino'],
      typeSpeed: 50,
    });
  </script>

</body>

</html>
